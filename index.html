<!DOCTYPE html>
<html>
<head>
<title>My Babu ❤️</title>

<style>
body {
  margin: 0;
  padding: 0;
  text-align: center;
  background: black;
  color: white;
  font-family: Arial;
  overflow: hidden;
}

/* Fade Animation */
.fade {
  animation: fadeIn 2s ease-in;
}
@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}

/* Start Screen */
#startScreen {
  position: absolute;
  top: 40%;
  width: 100%;
}

button {
  padding: 12px 25px;
  font-size: 18px;
  background: pink;
  border: none;
  border-radius: 12px;
  box-shadow: 0 0 10px pink;
}

/* Main */
#main {
  display: none;
  position: absolute;
  top: 35%;
  width: 100%;
}

/* Message */
#message {
  font-size: 24px;
  margin-top: 20px;
  min-height: 40px;
  text-shadow: 0 0 10px white;
}

/* Hearts */
.heart {
  position: absolute;
  font-size: 20px;
  animation: float 6s linear infinite;
}

@keyframes float {
  0% {transform: translateY(100vh);}
  100% {transform: translateY(-10vh);}
}

/* Final Screen */
#final {
  display: none;
  position: absolute;
  top: 40%;
  width: 100%;
  font-size: 45px;
  color: pink;
  animation: pulse 1s infinite alternate;
}

@keyframes pulse {
  from {transform: scale(1);}
  to {transform: scale(1.2);}
}
</style>

</head>

<body>

<!-- Start -->
<div id="startScreen" class="fade">
  <h1>💖 For My Babu 💖</h1>
  <button onclick="start()">Enter 💌</button>
</div>

<!-- Main -->
<div id="main" class="fade">
  <h1>🎂 Happy Birthday My Babu ❤️</h1>
  <p>Close your eyes & feel my love 💖</p>
  <div id="message"></div>
</div>

<!-- Final -->
<div id="final">
  ❤️ I LOVE YOU BABU FOREVER ❤️
</div>

<script>

function start() {
  document.getElementById("startScreen").style.display = "none";
  document.getElementById("main").style.display = "block";
  startLove();
}

var messages = [
  "Babu ❤️ I love you so much 💖",
  "You are my heart and soul 💕",
  "My world is nothing without you 😔",
  "Every moment with you is magic 💫",
  "You are my happiness 💞",
  "I promise to stay forever 💍",
  "You are my everything ❤️",
  "Babu... I'm really sorry 😔",
  "Please forgive me 💔",
  "I never want to lose you 💖"
];

function startLove() {
  let i = 0;
  let msgBox = document.getElementById("message");

  function typeText(text, callback) {
    let j = 0;
    msgBox.innerHTML = "";

    function typing() {
      if (j < text.length) {
        msgBox.innerHTML += text.charAt(j);
        j++;
        setTimeout(typing, 40);
      } else {
        setTimeout(callback, 1500);
      }
    }

    typing();
  }

  function nextMessage() {
    if (i < messages.length) {
      typeText(messages[i], () => {
        i++;
        nextMessage();
      });
    } else {
      showFinal();
    }
  }

  nextMessage();
}

function showFinal() {
  document.getElementById("main").style.display = "none";
  document.getElementById("final").style.display = "block";
}

// Hearts
setInterval(function() {
  var heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "💖";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (10 + Math.random() * 25) + "px";
  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 6000);
}, 300);

</script>

</body>
</html>
