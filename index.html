<!DOCTYPE html>
<html>
<head>
<title>My Princess ❤️</title>

<style>
body {
  margin: 0;
  padding: 0;
  text-align: center;
  background: linear-gradient(to right, #ff758c, #ff7eb3);
  color: white;
  font-family: Arial;
}

.content {
  margin-top: 100px;
}

button {
  padding: 12px 25px;
  font-size: 18px;
  background: white;
  color: red;
  border: none;
  border-radius: 10px;
}
</style>

</head>

<body>

<div class="content">
  <h1>Happy Birthday My Princess ❤️</h1>
  <p>Click below for something special 💖</p>

  <button onclick="showMessages()">Tap for Love 💌</button>
</div>

<script>
function showMessages() {

  var messages = [
    "🎂 Happy Birthday My Princess ❤️",
    "I love you more than anything 💖",
    "You are my heart and my soul 💕",
    "I promise to stay with you forever 💍",
    "You are my dream come true 😍",
    "My life is beautiful because of you 💫",
    "I can't imagine my life without you 💔",
    "You are my future wife ❤️",
    "Every moment with you is special 💞",
    "I will always love you forever 💖"
  ];

  var i = 0;

  function nextMessage() {
    if (i < messages.length) {
      alert(messages[i]);
      i++;
      setTimeout(nextMessage, 500);
    }
  }

  nextMessage();
}
</script>

</body>
</html>
