<!DOCTYPE html>
<html>
<head>
<title>My Love ❤️</title>

<style>
body {
  margin: 0;
  padding: 0;
  text-align: center;
  background: linear-gradient(to right, #ff4e50, #fc913a);
  color: white;
  font-family: Arial;
  overflow: hidden;
}

.content {
  position: absolute;
  top: 40%;
  width: 100%;
}

/* Hearts */
.heart {
  position: absolute;
  font-size: 20px;
  animation: float 6s linear infinite;
}

@keyframes float {
  0% {transform: translateY(100vh);}
  100% {transform: translateY(-10vh);}
}
</style>

</head>

<body>

<div class="content">
  <h1>Happy Birthday My Love ❤️</h1>
  <p>You are my life, my everything 💖</p>
</div>

<script>
// Auto popup
window.onload = function() {
  alert("🎂 Happy Birthday My Jaan ❤️ I Love You Forever 💖");
}

// Hearts animation
setInterval(function() {
  var heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "💖";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (10 + Math.random() * 25) + "px";
  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 6000);
}, 300);
</script>

</body>
</html>
