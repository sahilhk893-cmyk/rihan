<!DOCTYPE html>
<html>
<head>
<title>My Babu ❤️</title>

<style>
body {
  margin: 0;
  padding: 0;
  text-align: center;
  background: linear-gradient(to right, #ff6a88, #ff99ac);
  color: white;
  font-family: Arial;
  overflow: hidden;
}

.content {
  position: absolute;
  top: 35%;
  width: 100%;
}

h1 {
  font-size: 36px;
}

#message {
  font-size: 22px;
  margin-top: 20px;
  min-height: 40px;
}

button {
  margin-top: 20px;
  padding: 12px 25px;
  font-size: 18px;
  background: white;
  color: red;
  border: none;
  border-radius: 12px;
}

/* hearts */
.heart {
  position: absolute;
  font-size: 20px;
  animation: float 6s linear infinite;
}

@keyframes float {
  0% {transform: translateY(100vh);}
  100% {transform: translateY(-10vh);}
}
</style>

</head>

<body>

<div class="content">
  <h1>🎂 Happy Birthday My Babu ❤️</h1>
  <p>Tap below and feel my heart 💖</p>

  <button onclick="startLove()">Start Love 💌</button>

  <div id="message"></div>
</div>

<script>

var messages = [
  "Babu ❤️ I love you so much 💖",
  "You are my life, my everything 💕",
  "I can't imagine my world without you 😔",
  "You are my happiness and my peace 💫",
  "Every moment with you is special 💞",
  "I promise to stay with you forever 💍",
  "You are not just my love, you are my soul ❤️",
  "Babu... I'm really sorry 😔",
  "Please forgive me, I never want to hurt you 💔",
  "I love you more than words can say 💖"
];

function startLove() {
  let i = 0;
  let msgBox = document.getElementById("message");

  function typeText(text, callback) {
    let j = 0;
    msgBox.innerHTML = "";

    function typing() {
      if (j < text.length) {
        msgBox.innerHTML += text.charAt(j);
        j++;
        setTimeout(typing, 50);
      } else {
        setTimeout(callback, 1500);
      }
    }

    typing();
  }

  function nextMessage() {
    if (i < messages.length) {
      typeText(messages[i], () => {
        i++;
        nextMessage();
      });
    } else {
      // final message
      msgBox.innerHTML = "❤️ I LOVE YOU BABU FOREVER ❤️";
    }
  }

  nextMessage();
}

// hearts animation
setInterval(function() {
  var heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "💖";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (10 + Math.random() * 25) + "px";
  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 6000);
}, 300);

</script>

</body>
</html>
